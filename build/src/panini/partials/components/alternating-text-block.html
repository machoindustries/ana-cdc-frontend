<!-- BE There are two classes for the color theme 1. orange-background-blue-hover 2. blue-background-orange-hover -->
<!-- BE if there is an external link, pass in _blank for the link target. -->
<section class="alternating-text-block small-12 grid-x {{styles-1}}">
    <div class="photo-block show-for-large large-4">
        <div class="img-container">
            <img src="{{img-src}}" alt="{{img-alt}}">
        </div>
    </div>
    <div class="content-block small-12 large-8">
        <div>
            <h2>{{title}}</h2>
            <p>{{content}}</p>
            <button>
                <a href="{{button-url}}" target="{{has-external-link}}">{{button-text}}</a>
            </button>
        </div>
    </div>
</section>
