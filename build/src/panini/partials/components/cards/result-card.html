<section class="grid-x align-center cell small-12 large-9">
  <div class="cell small-12 filter-results">
    <div class="card-results">
      <div>
        Showing
        <span class="filter-results__number">X</span>
        of
        <span class="filter-results__number">X</span>
        results
      </div>
    </div>
  </div>

  <!-- <p><button class="button" data-open="exampleModal1">Click me for a modal</button></p> -->
  {{#each card-carousel.card}}
  <article class="card small-12 medium-6 large-4 grid-x white-space">
    <a class="link-wrapper" href="x">
      <div class="resource-img-wrapper cell small-12">
        <div class="resource-img-container ">
          <img alt="alt text" class="resource-img" src="https://picsum.photos/seed/picsum/200/300">
          <div class="resource-img-overlay"></div>

          <!-- if video -->

          <button data-open="video-modal-1234unique" class="button resource-icon-container">
            <img class='resource-link-icon' src="./assets/img/youtube-1.svg" alt="video icon">
          </button>
          <div class="reveal open-modal" id="video-modal-1234unique" data-reveal data-reset-on-close="true"
            data-animation-in="fade-in" data-animation-out="fade-out">
            <iframe class="open-modal__video" allowfullscreen src="http://www.youtube.com/embed/W7qWa52k-nE">
            </iframe>
            <button class="close-button close-button-custom" data-close aria-label="Close modal" type="button">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>

          <!-- if download link -->

          <!-- <a href="{{url}}" download data-open="video-modal-{{id}}" class=" resource-icon-container">
             <img class='resource-link-icon' src="{{background}}" alt="link">
           </a>   -->
        </div>
      </div>
      <div class="card-section resource-content">
        <h4 class="resource-title">{{title}}</h4>
        <div class="resource-description-wrapper">
          <p class="resource-description">{{content}}</p>
        </div>
      </div>
      <div class="resource-topics">
        <div class="resource-ANA">{{source}}</div>
        <div class="topic">{{topic}}</div>
        <div class="topic">{{subTopic}}</div>

        {{> share-button }}

        <div class="reveal" id="share-resource{{id}}" data-reveal>
          asdfasdf
          <!-- <div class="addthis_inline_share_toolbox_qrdc"></div>
          <button class="close-button" data-close aria-label="Close modal" type="button">
            <span aria-hidden="true">&times;</span>
          </button> -->
        </div>
      </div>
    </a>
  </article>
  {{/each}}
  {{> resource-pagination}}
  <!-- Go to www.addthis.com/dashboard to customize your tools -->
  <!-- <div class="addthis_inline_share_toolbox"></div> -->
</section>
