<div class="internal-nav-container-update cell small-12 grid-x mt-2 mb-1">
    <div class="title-bar no-js ml-1" data-responsive-toggle="internal-nav-menu">
      <button class="hamburger menu-icon hide-for-large" type="button" data-toggle>
        <span class="sr-only">Open internal navigation</span>
      </button>
    </div> 
  
    <div class="internal-nav-update xlarge-12" id="internal-nav-menu" style="display:none;">
        <div class="grid-x">
            <div class="links">
                {{#each cdc-nav.sub-nav}}
                <div><a href="{{url}}">{{title}}</a></div>
                {{/each}}
                <div></div> 
            </div>
            <div class="btn-container">
                {{#if cdc-nav.btn-url}}
                <button href="#" class="email-us-btn">
                  <a href="{{cdc-nav.btn-url}}">Email Us</a>
                </button>
                {{else}}
                <button href="#" class="email-us-btn">
                  Email Us
                </button>
                {{/if}}
                <button  class="button-hollow-blue orange-hover">
                  <a href="#">SIGN UP</a>
                </button>
            </div>
        </div>
    </div>
     
  </div>
