<div class="mobile-jump-nav">
  <div class="title-bar no-js" data-responsive-toggle="jump-nav-menu">
    <button id="jump-button" class="jump-button hide-for-large" type="button" data-toggle>Resources . . .</button>
  </div>

  <div id="jump-nav-menu">
    <ul class="dropdown menu" data-dropdown-menu="">
      {{#each jump-nav.jump}}
      <li class="e-nav-primary__item e-nav-primary__item--home" >
        <a href="{{url}}" class="e-nav-primary__link" data-primary-nav-trigger="" data-primary-nav-link="" data-gtm-event-action="{{title}}" data-gtm-event-label-title="">
        <span class="e-nav-primary__link-text">{{title}}</span>
        </a>
      </li>
      {{/each}}
    </ul>
  </div>
</div>
