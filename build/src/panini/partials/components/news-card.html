<article class="news-card-container">
  <div class="news-card mb-2">
    <div class="mb-1">
      <a href="/detail.html">
        <img src="{{img}}" alt="image alt" />
      </a>
    </div>
    <h5 class="news-card_title b700">{{title}}</h5>
    <p class="truncate-overflow">{{summary}}</p>
    <a class="see-all-link cell shrink" href="{{link}}">Read more</a>
  </div>
</article>
