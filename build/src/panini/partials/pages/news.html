<!--NEWS PAGE-->
<div class="grid-container mb-3">
  <div class="grid-x">
    <header class="small-12 cell">
      <h1 class="hide" aria-hidden="true">News</h1>
    </header>

    {{> hero-small}}

    {{> internal-nav}}

    {{> page-header}}


    <div class="vert-grad-bottom cell small-12">
      <div class="inner-grad hide=hide-for-small-only"></div>

      <div class="grid-x">

        <!--BEGIN Main Column LEFT-->

        <div class="main-left news-cards cell small-12 large-10 mt-3">
          <!-- Start News Section -->
          <section id="news">
            <div class="grid-x grid-margin-x">
              {{#each news.fulllist}}
              <div class="cell small-12 medium-6 large-4">
                {{> news-card this}}
              </div>
              {{/each}}
            </div>
          </section>
          <!-- End News Section -->
        </div>

        <div class="side-listing cell small-12 large-2 mt-3">
          <div class="grid-x">
            {{> side-promo}}
          </div>
        </div>
      </div>
    </div>

    {{> modal}}
  </div>
</div>
