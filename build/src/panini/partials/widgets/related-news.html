<div class="related-news-component cell small-12">
  <h5 class="mb-2">Related News</h5>

  <div class="grid-x grid-margin-x align-justify">
    <div class="cell small-12 large-8">
      <div class="grid-x grid-margin-x align-justify">
        {{#each news.related}}
        <div class="cell small-12 medium-6 large-6">
          {{> related-news-card this}}
        </div>
        {{/each}}
      </div>
      <div class="mb-2">
        <a class="see-all" href="/news.html">
          <h5>See all</h5>
        </a>
      </div>
    </div>
    <div class="cell small-12 large-4">
      <div class="grid-x grid-margin-x">
        {{> side-promo}}
      </div>
    </div>
  </div>
</div>
