<section class="stat cell small-12" data-module-core="by-the-number">
  <div class="grid-x grid-margin-x align-center">
    <div class="cell small-12 large-4">
      <div class="stat-box stat-border small-12 medium-6 large-4">
        <p class="stat-value" data-number="6000000" data-effect="OneTimeAnimation">6,000,000</p>
        <p class="stat-label">healthcare professionals</p>
      </div>
    </div>
    <div class="cell small-12 large-4">
      <div class="stat-box stat-border small-12 medium-6 large-4">
        <p class="stat-value" data-number="64" data-effect="CountUpConstantly">64</p>
        <p class="stat-label">health departments</p>
      </div>
    </div>
    <div class="cell small-12 large-4">
      <div class="stat-box stat-border small-12 medium-6 large-4">
        <p class="stat-label-top">across all</p>
        <p class="stat-value" data-number="50" data-effect="CountDownConstantly">50</p>
        <p class="stat-label-bold">United States</p>
      </div>
    </div>
  </div>
</section>
